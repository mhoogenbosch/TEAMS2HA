name: Rust Security Audit

on:
  push:
    branches: [ "master" ]
    paths:
      - 'tauri/src-tauri/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'tauri/src-tauri/**'
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: cargo audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        working-directory: tauri/src-tauri
        # All ignored advisories are for crates pinned deep in Tauri's own
        # dependency tree that we cannot upgrade directly:
        #
        #  - RUSTSEC-2026-0049/0098/0099/0104: rustls-webpki 0.102.8. The patched
        #    0.103.13 is also resolved; only the 0.102.x copy we can't control remains.
        #  - RUSTSEC-2026-0194/0195: quick-xml 0.37.5, pulled via
        #    tauri-winrt-notification -> notify-rust (latest release, no upgrade
        #    available). It only parses toast XML this app generates itself, so the
        #    DoS-via-malicious-XML vector doesn't apply. The other quick-xml copy
        #    (build-time, via plist) is already bumped to the patched 0.41.0.
        #
        # Un-ignore each once the upstream chain drops its old constraint.
        run: >
          cargo audit
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0104
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195

  clippy:
    name: cargo clippy
    runs-on: windows-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Run clippy
        working-directory: tauri/src-tauri
        run: cargo clippy --all-targets -- -D warnings
