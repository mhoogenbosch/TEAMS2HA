name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: aarch64-pc-windows-msvc
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: pwsh
        working-directory: tauri
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag '$tag' must be X.Y.Z semver (e.g. v1.2.3). Aborting."
            exit 1
          }
          Write-Host "Stamping internal version $version from tag $tag"
          foreach ($f in @('src-tauri/tauri.conf.json', 'package.json')) {
            (Get-Content $f -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"$version`"" |
              Set-Content $f -Encoding utf8 -NoNewline
          }
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = "[^"]*"', "version = `"$version`"" |
            Set-Content src-tauri/Cargo.toml -Encoding utf8 -NoNewline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: Teams2HA ${{ github.ref_name }}
          releaseBody: Release notes worden door CI aangevuld / release notes are added by CI in a moment.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  # Compose the real release notes once both builds have published: the tag's
  # section from CHANGELOG.md ("what's new") followed by the install template.
  notes:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compose and set release notes from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          awk -v tag="$tag" '
            /^## \[/ { if (found) exit; if (index($0, "[" tag "]") > 0) { found=1; next } }
            found { print }
          ' CHANGELOG.md > section.md
          {
            if [ -s section.md ]; then
              echo "## What's new in $tag"
              echo
              cat section.md
              echo
              echo "---"
              echo
            fi
            cat .github/RELEASE_TEMPLATE.md
          } > body.md
          gh release edit "$tag" --notes-file body.md
