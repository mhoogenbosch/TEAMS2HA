name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    # Code signing via SignPath switches on automatically once the repo is configured:
    # secret SIGNPATH_API_TOKEN + variables SIGNPATH_ORGANIZATION_ID / SIGNPATH_PROJECT_SLUG /
    # SIGNPATH_POLICY_SLUG. Without them the release is published unsigned, as before.
    env:
      SIGNPATH_ENABLED: ${{ secrets.SIGNPATH_API_TOKEN != '' && vars.SIGNPATH_ORGANIZATION_ID != '' }}

    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: aarch64-pc-windows-msvc
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: pwsh
        working-directory: tauri
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag '$tag' must be X.Y.Z semver (e.g. v1.2.3). Aborting."
            exit 1
          }
          Write-Host "Stamping internal version $version from tag $tag"
          foreach ($f in @('src-tauri/tauri.conf.json', 'package.json')) {
            (Get-Content $f -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"$version`"" |
              Set-Content $f -Encoding utf8 -NoNewline
          }
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = "[^"]*"', "version = `"$version`"" |
            Set-Content src-tauri/Cargo.toml -Encoding utf8 -NoNewline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: Teams2HA ${{ github.ref_name }}
          releaseBody: |
            ## Installation
            Download the installer for your architecture and run it.
            No administrator rights required — installs per-user to `%LOCALAPPDATA%`.

            | File | Architecture |
            |------|-------------|
            | `Teams2HA_*_x64-setup.exe` | Intel / AMD (most PCs) |
            | `Teams2HA_*_arm64-setup.exe` | ARM64 (Surface Pro X, Copilot+ PCs) |

            If you previously had the .NET version installed, it will be automatically
            removed on first launch of the new version.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # --- SignPath code signing (skipped until the repo is configured, see job env) ---

      - name: Locate built installer
        if: env.SIGNPATH_ENABLED == 'true'
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem "tauri/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/Teams2HA_*-setup.exe" |
            Select-Object -First 1
          if (-not $exe) { Write-Error "Installer not found for signing"; exit 1 }
          "path=$($exe.FullName)" | Out-File $env:GITHUB_OUTPUT -Append
          "name=$($exe.Name)" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Upload unsigned installer as workflow artifact
        if: env.SIGNPATH_ENABLED == 'true'
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-${{ matrix.label }}
          path: ${{ steps.installer.outputs.path }}
          if-no-files-found: error

      - name: Submit SignPath signing request
        if: env.SIGNPATH_ENABLED == 'true'
        id: signing
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          # Release signing policies typically require manual approval in SignPath;
          # give the approver half an hour before the job gives up.
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signed

      - name: Replace release asset with signed installer
        if: env.SIGNPATH_ENABLED == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $signed = Get-ChildItem "signed" -Recurse -Filter "${{ steps.installer.outputs.name }}" |
            Select-Object -First 1
          if (-not $signed) { Write-Error "Signed installer not found in SignPath output"; exit 1 }
          gh release upload "${{ github.ref_name }}" "$($signed.FullName)" --clobber
