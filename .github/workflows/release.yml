name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: x64
          - target: aarch64-pc-windows-msvc
            label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: pwsh
        working-directory: tauri
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Tag '$tag' must be X.Y.Z semver (e.g. v1.2.3). Aborting."
            exit 1
          }
          Write-Host "Stamping internal version $version from tag $tag"
          foreach ($f in @('src-tauri/tauri.conf.json', 'package.json')) {
            (Get-Content $f -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"$version`"" |
              Set-Content $f -Encoding utf8 -NoNewline
          }
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = "[^"]*"', "version = `"$version`"" |
            Set-Content src-tauri/Cargo.toml -Encoding utf8 -NoNewline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tauri

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: Teams2HA ${{ github.ref_name }}
          releaseBody: |
            ## 🇬🇧 English

            ### Installation
            Download the installer for your architecture and run it.
            No administrator rights required — installs per-user to `%LOCALAPPDATA%`.

            | File | Architecture |
            |------|-------------|
            | `Teams2HA_*_x64-setup.exe` | Intel / AMD (most PCs) |
            | `Teams2HA_*_arm64-setup.exe` | ARM64 (Surface Pro X, Copilot+ PCs) |

            After the first version with the auto-updater is installed, future
            releases install themselves — the app checks on startup and prompts you.
            If you previously had the .NET version installed, it is automatically
            removed on first launch of the new version.

            ---

            ## 🇳🇱 Nederlands

            ### Installatie
            Download de installer voor jouw architectuur en voer 'm uit.
            Geen adminrechten nodig — installeert per gebruiker in `%LOCALAPPDATA%`.

            | Bestand | Architectuur |
            |------|-------------|
            | `Teams2HA_*_x64-setup.exe` | Intel / AMD (de meeste pc's) |
            | `Teams2HA_*_arm64-setup.exe` | ARM64 (Surface Pro X, Copilot+ pc's) |

            Zodra de eerste versie met auto-updater geïnstalleerd is, installeren
            volgende releases zichzelf — de app controleert bij het opstarten en vraagt het je.
            Had je eerder de .NET-versie? Die wordt bij de eerste start automatisch verwijderd.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
